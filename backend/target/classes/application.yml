spring:
  application:
    name: demo
  datasource:
    url: jdbc:mysql://localhost:3306/demo?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  neo4j:
    uri: bolt://localhost:7687
    username: neo4j
    password: password
  data:
    redis:
      host: localhost
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/auth/realms/demo
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: permission-service
          uri: lb://permission-service
          predicates:
            - Path=/system/**
  server:
    port: 8080

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.data.neo4j: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env